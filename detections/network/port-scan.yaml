id: det-net-003
name: Port Scan Detected
description: Detects port scanning activity targeting network infrastructure.
severity: medium
category: network
tags:
  - attack.t1046
  - attack.ta0007
detection:
  match:
    and:
      - {field: event_type, op: eq, value: port_scan}
false_positives:
  - Authorized vulnerability assessments
  - Network inventory tools
enabled: true
author: builtin
